#cloud-config

# Nombre del host inyectado dinámicamente desde Terraform
hostname: ${hostname}
fqdn: ${hostname}.opennebula.local
manage_etc_hosts: true

# Usuario administrador del laboratorio
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin, sudo, libvirt
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}

# Paquetes base — el resto lo instala Ansible
package_update: true
package_upgrade: false
packages:
  - qemu-guest-agent
  - python3
  - python3-pip
  - nfs-common
  - curl
  - wget
  - net-tools
  - iputils-ping

# Configuración de red mínima
write_files:
  - path: /etc/sysctl.d/99-opennebula.conf
    content: |
      # Necesario para KVM anidado y tráfico de red virtual
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 0
      net.bridge.bridge-nf-call-ip6tables = 0

runcmd:
  # Iniciar agente QEMU para que libvirt pueda leer la IP
  - systemctl enable --now qemu-guest-agent
  # Aplicar sysctl sin reinicio
  - sysctl --system
  # Marca de que cloud-init terminó correctamente
  - echo "cloud-init OK en $(hostname) — $(date)" > /var/log/cloud-init-done.log

# No enviar datos a ningún servidor externo
phone_home:
  url: ""
  post: []